name: CI

on:
  push:

jobs:
  nix-flake-health:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: nix flake show
      - run: nix flake lock --no-update-lock-file
      - run: nix flake check --no-build

  nix-flake-check:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: nix flake check -L --keep-going

name: PR

on:
  pull_request:
  merge_group:

jobs:
  conventional-commit:
    name: "PR title"
    runs-on: ubuntu-latest
    steps:
      - run: |
          <<<"$TITLE" grep '^\(build\|chore\|ci\|docs\|feat\|fix\|perf\|p\?refactor\|revert\|style\|test\)\(([a-zA-Z0-9_-]\+)\)\?!\?: '
        env:
          TITLE: "${{ github.event.pull_request.title || github.event.merge_group.head_commit.message }}"
  nocommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: nobssoftware/nocommit@5c3cf9519fe40b80b0954d254085b67b532a5dc3
